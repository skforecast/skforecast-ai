name: AI Context Check

on:
  pull_request:
    branches: [main]
    paths:
      - "skforecast_ai/skills/**"
      - "skforecast_ai/resources/**"
      - "skforecast_ai/llm/prompts.py"

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Check token estimates are up-to-date
        run: python3 tools/measure_skill_tokens.py --check

      - name: Check AI assets (llms-base.txt + skills) are up-to-date
        run: python3 tools/sync_skforecast_assets.py --check --branch auto
