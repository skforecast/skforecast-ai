site_name: skforecast-AI Docs
repo_url: https://github.com/skforecast/skforecast-ai
site_url: https://github.com/skforecast/skforecast-ai
site_description: AI-powered forecasting assistant built on top of skforecast.
site_author: Joaquin Amat Rodrigo and Javier Escobar Ortiz
use_directory_urls: false
copyright: Copyright &copy; 2024 - 2030 Joaquín Amat Rodrigo, Javier Escobar Ortiz

nav:
  - Home: 
    - Welcome to skforecast-ai: README.md
  
  - Quick start:
    - Quick start: quick-start/quick-start.md
    - Your first forecast: quick-start/first-forecast.md
    - How to install: quick-start/how-to-install.md

  - User Guides:
    - Agentic forecasting: user-guides/agentic-forecasting.ipynb
    - Agentic forecasting step by step: user-guides/agentic-forecasting-step-by-step.ipynb
    - Using the CLI: user-guides/cli-usage.md
  - Releases:
    - Changelog: releases/releases.md

  - API Reference:
    - Assistant: api/assistant.md
    - Schemas:
      - Results: api/schemas/results.md
      - Plans: api/schemas/plans.md
      - Profiles: api/schemas/profiles.md
    - CLI: api/cli.md

  - More: 
    - About skforecast-ai: more/about-skforecast-ai.md
    - Consulting & Professional services: more/consulting.md

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/version-switcher.js
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

hooks:
  - tools/mkdocs_hooks.py

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            docstring_section_style: table
            filters: ["!__"] # exclude all members starting with __
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_source: true
            show_if_no_docstring: true
            show_root_full_path: true
            show_root_heading: true
            show_signature_annotations: false
            show_symbol_type_heading: false
            summary: true
            group_by_category: true
            show_category_heading: true
  - mkdocs-typer2:
      pretty: true
      engine: native
  - mkdocs-jupyter:
      allow_errors: False
      execute: False
      ignore_h1_titles: True
      include_requirejs: True
      include_source: True
  - mike:
      alias_type: copy
      canonical_version: latest
      css_dir: css
      deploy_prefix: ''
      javascript_dir: js
      redirect_template: null
      version_selector: true
  - search:
      lang: en
      separator: '[\s\-\._]+'

theme:
  name: material
  custom_dir: docs/overrides
  favicon: img/favicon.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - toc.integrate
    - navigation.breadcrumbs
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share
  font:
    text: Open Sans
    code: Ubuntu Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: light
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      use_pygments: true
      linenums: false
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  
extra:
  version:
    provider: mike
  analytics:
    provider: google
    property: G-1L7X239QEB
  consent:
    title: Cookie consent
    description: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/skforecast/
    - icon: fontawesome/brands/github
      link: https://github.com/skforecast/skforecast-ai
