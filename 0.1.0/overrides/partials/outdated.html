<div>
  This is documentation for an unstable development version.
  {% if alternate_url %}
    <a href="{{ alternate_url }}" id="version-switch-link">
      <strong>Switch to latest stable version.</strong>
    </a>
  {% else %}
    <a href="{{ '../' ~ base_url }}" id="version-switch-link">
      <strong>Switch to latest stable version.</strong>
    </a>
  {% endif %}
</div>
